<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Online Exam Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
            color: #1f4037;
        }

        p {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }

        .toggle-btns {
            display: flex;
            margin-bottom: 20px;
        }

        .toggle-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: #ddd;
            font-weight: bold;
        }

        .toggle-btns button.active {
            background: #1f4037;
            color: white;
        }

        form {
            display: none;
        }

        form.active {
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #1f4037;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.submit-btn:hover {
            background: #16322c;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Online Proctored Exam</h1>
    <p>AI-Based Monitoring System</p>

    <div class="toggle-btns">
        <button id="registerBtn" class="active" onclick="showRegister()">Register</button>
        <button id="loginBtn" onclick="showLogin()">Login</button>
    </div>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="active" method="POST" action="/register">

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="professor">Professor</option>
        </select>

        <input type="text" name="fullname" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="userid" placeholder="Student/Professor ID" required>
        <input type="password" name="password" placeholder="Create Password" required>

        <button type="submit" class="submit-btn">Register</button>
    </form>

    <!-- LOGIN FORM -->
    <form id="loginForm" method="POST" action="/login">

        <select name="role" required>
            <option value="">Login As</option>
            <option value="student">Student</option>
            <option value="professor">Professor</option>
        </select>

        <input type="text" name="userid" placeholder="Student/Professor ID" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" class="submit-btn">Login</button>
    </form>

    <div class="footer">
        Secure | Encrypted | AI Monitored
    </div>

</div>

<script>
    function showRegister() {
        document.getElementById("registerForm").classList.add("active");
        document.getElementById("loginForm").classList.remove("active");
        document.getElementById("registerBtn").classList.add("active");
        document.getElementById("loginBtn").classList.remove("active");
    }

    function showLogin() {
        document.getElementById("loginForm").classList.add("active");
        document.getElementById("registerForm").classList.remove("active");
        document.getElementById("loginBtn").classList.add("active");
        document.getElementById("registerBtn").classList.remove("active");
    }
</script>

</body>
</html>
